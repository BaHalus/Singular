name: Handoff
on:
  push:
    branches: [ main, master ]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p artifacts && cp -r Docs artifacts/ || true
      - uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: artifacts
