name: SINGULAR-HANDOFF

on:
  push:
    branches:
      - main

jobs:
  assume-coordination:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Validate handoff
        run: echo "Assumindo coordenação conforme Issue #356"

  sync-state:
    runs-on: ubuntu-latest
    needs: assume-coordination
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Get issue comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/issues/comments/4970944834 \
            | jq -r '.body' > STATE.md
      - name: Commit updated state
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add STATE.md
          git commit -m "Atualiza STATE.md com comentário 4970944834"
          git push

  implement-mf6:
    runs-on: ubuntu-latest
    needs: sync-state
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Execute MF6
        run: echo "Implementando API pública única conforme Issue #354"