name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('tests-pr-{0}', github.event.pull_request.number) || format('tests-run-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Apply final Template import integrity patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          source_path = Path("src/domain/import/TemplateImportOperations.js")
          source = source_path.read_text()

          if "snapshotFingerprint: createValueFingerprint(analysis)" not in source:
            source, count = re.subn(
              r'(\n\s*analysisFingerprint:\s*analysis\.analysisFingerprint,\n)(\s*options:\s*cloneValue\(analysis\.options\),)',
              r'\1    snapshotFingerprint: createValueFingerprint(analysis),\n\2',
              source,
              count=1,
            )
            if count != 1:
              raise SystemExit("could not insert snapshotFingerprint into plan")

          if "TEMPLATE_IMPORT_PLAN_TAMPERED" not in source:
            integrity_block = '''  const approvedAnalysis = plan.analysis;
            validateTemplateImportAnalysis(approvedAnalysis);
            const approvedSnapshotFingerprint = createValueFingerprint(approvedAnalysis);
            const approvedPlanFingerprint = createPlanFingerprint(plan);
            if (
              approvedSnapshotFingerprint !== plan.snapshotFingerprint ||
              approvedPlanFingerprint !== plan.planFingerprint
            ) {
              throw new TemplateImportOperationError(
                "TEMPLATE_IMPORT_PLAN_TAMPERED",
                "Template import plan snapshot was altered",
                {
                  expectedSnapshotFingerprint: plan.snapshotFingerprint,
                  currentSnapshotFingerprint: approvedSnapshotFingerprint,
                  expectedPlanFingerprint: plan.planFingerprint,
                  currentPlanFingerprint: approvedPlanFingerprint,
                },
              );
            }
            const executedAt = normalizeTimestamp(options.now ?? plan.plannedAt);'''
            source, count = re.subn(
              r'\s*const approvedAnalysis = plan\.analysis;\n\s*validateTemplateImportAnalysis\(approvedAnalysis\);\n\s*const executedAt = normalizeTimestamp\(options\.now \?\? plan\.plannedAt\);',
              '\n' + integrity_block,
              source,
              count=1,
            )
            if count != 1:
              raise SystemExit("could not insert approved snapshot integrity check")

          validator_marker = '    "snapshotFingerprint",'
          if validator_marker not in source:
            source, count = re.subn(
              r'(\n\s*"analysisFingerprint",\n)(\s*"planFingerprint",)',
              r'\1    "snapshotFingerprint",\n\2',
              source,
              count=1,
            )
            if count != 1:
              raise SystemExit("could not require snapshotFingerprint in plan validator")

          plan_fingerprint_marker = "snapshotFingerprint: plan.snapshotFingerprint"
          if plan_fingerprint_marker not in source:
            source, count = re.subn(
              r'(\n\s*analysisFingerprint:\s*plan\.analysisFingerprint,\n)(\s*options:\s*plan\.options,)',
              r'\1    snapshotFingerprint: plan.snapshotFingerprint,\n\2',
              source,
              count=1,
            )
            if count != 1:
              raise SystemExit("could not bind snapshotFingerprint into plan fingerprint")

          old_compare = "templateFingerprint(existing) === templateFingerprint(template)"
          if old_compare in source:
            source = source.replace(
              old_compare,
              "importDefinitionFingerprint(existing) ===\n        importDefinitionFingerprint(template)",
              1,
            )

          if "function importDefinitionFingerprint(template)" not in source:
            helper = '''function importDefinitionFingerprint(template) {
              const fingerprint = template.importMeta?.importFingerprint;
              return typeof fingerprint === "string" && fingerprint !== ""
                ? fingerprint
                : templateFingerprint(template);
            }

            function templateFingerprint(template) {'''
            source, count = re.subn(
              r'function templateFingerprint\(template\) \{',
              helper,
              source,
              count=1,
            )
            if count != 1:
              raise SystemExit("could not insert importDefinitionFingerprint helper")

          required_markers = [
            "snapshotFingerprint: createValueFingerprint(analysis)",
            "TEMPLATE_IMPORT_PLAN_TAMPERED",
            '"snapshotFingerprint",',
            "snapshotFingerprint: plan.snapshotFingerprint",
            "function importDefinitionFingerprint(template)",
          ]
          missing = [marker for marker in required_markers if marker not in source]
          if missing:
            raise SystemExit(f"missing final source markers: {missing}")

          source_path.write_text(source)

          test_path = Path("src/domain/import/TemplateImportOperations.test.js")
          tests = test_path.read_text()
          if 'test("collapses equivalent anonymous packages despite transient child ids"' not in tests:
            tests += '''

            test("collapses equivalent anonymous packages despite transient child ids", () => {
              const anonymous = {
                type: "template",
                version: 2,
                name: "Pacote anônimo duplicado",
                template_type: "profession",
                skills: [{
                  type: "skill",
                  name: "Comércio",
                  difficulty: "iq/a",
                  points: 2,
                }],
              };
              const analysis = analyzeTemplateImport([
                anonymous,
                structuredClone(anonymous),
              ]);

              assert.equal(analysis.status, "ready-with-warnings");
              assert.equal(analysis.templates.length, 1);
              assert.equal(
                analysis.diagnostics.some(item => (
                  item.code === "template-import-duplicate-collapsed"
                )),
                true,
              );
            });

            test("rejects altered approved analysis snapshots", () => {
              const source = createTemplateSource();
              const plan = structuredClone(planTemplateImport(source, {
                now: NOW,
                planId: "plan-tampered-import",
                operationId: "operation-tampered-import",
              }));
              plan.analysis.templates[0].name = "Pacote injetado";

              assert.throws(
                () => executeTemplateImportPlan(source, plan, { now: NOW }),
                error => (
                  error instanceof TemplateImportOperationError &&
                  error.code === "TEMPLATE_IMPORT_PLAN_TAMPERED"
                ),
              );
            });
            '''
            test_path.write_text(tests)
          PY

      - name: Commit final Template import integrity patch
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/domain/import/TemplateImportOperations.js src/domain/import/TemplateImportOperations.test.js
          git commit -m "fix: proteger snapshots e duplicatas anônimas de importação"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Run full test suite
        run: npm test
