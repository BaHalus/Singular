name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('tests-pr-{0}', github.event.pull_request.number) || format('tests-run-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout quiet
        run: |
          git init -q .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git fetch -q --depth=1 origin "$GITHUB_SHA"
          git checkout -q --detach FETCH_HEAD

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Run full test suite
        run: |
          set +e
          npm test > singular-test.log 2>&1
          status=$?
          {
            grep -n -B 20 -A 45 -E "not ok|failureType|AssertionError|ERR_|expected|actual" singular-test.log || true
            echo "--- SUMMARY ---"
            tail -n 20 singular-test.log
          } > singular-test-tail.txt
          cat singular-test-tail.txt
          exit $status

      - name: Upload test tail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: singular-test-tail
          path: singular-test-tail.txt
          if-no-files-found: error
