name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('tests-pr-{0}', github.event.pull_request.number) || format('tests-run-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Run full test suite
        run: |
          npm test > /tmp/singular-test.log 2>&1 || {
            tail -n 240 /tmp/singular-test.log > /tmp/singular-test-tail.log
            cat /tmp/singular-test-tail.log
            exit 1
          }

      - name: Upload failure tail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: singular-test-tail
          path: /tmp/singular-test-tail.log
          if-no-files-found: ignore
