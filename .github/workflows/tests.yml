name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('tests-pr-{0}', github.event.pull_request.number) || format('tests-run-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Run full test suite
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ github.run_id }}
          path: test-output.log
          if-no-files-found: error
          retention-days: 3

  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pinned Playwright test runner
        run: npm install --no-save --no-package-lock @playwright/test@1.54.1

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run real mobile browser smoke
        shell: bash
        run: |
          set -o pipefail
          npx playwright test --config=playwright.config.js 2>&1 | tee browser-smoke-output.log

      - name: Upload browser smoke evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-${{ github.run_id }}
          path: |
            browser-smoke-output.log
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 3
