name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests and build failure summary
        id: tests
        shell: bash
        run: |
          set +e
          node --test --test-reporter=tap > test-output.txt 2>&1
          code=$?
          python - <<'PY' > failure-summary.txt
          from pathlib import Path
          lines = Path('test-output.txt').read_text(errors='replace').splitlines()
          indexes = [i for i, line in enumerate(lines) if 'not ok ' in line]
          if not indexes:
              print('\n'.join(lines[-80:]))
          else:
              for index in indexes:
                  print('\n'.join(lines[max(0, index - 3):min(len(lines), index + 55)]))
                  print('--- FAILURE SEPARATOR ---')
              for marker in ('# tests ', '# pass ', '# fail ', '# duration_ms '):
                  match = next((line for line in reversed(lines) if line.startswith(marker)), None)
                  if match is not None:
                      print(match)
          PY
          cat failure-summary.txt
          exit $code

      - name: Upload failure summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dom-morph-1.4-failure-summary
          path: failure-summary.txt
          if-no-files-found: error
