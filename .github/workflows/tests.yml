name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('tests-pr-{0}', github.event.pull_request.number) || format('tests-run-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Run mobile attack tests
        run: files=$(find src/ui/mobile -name '*Attack*.test.js' -print); [ -z "$files" ] || node --test $files

      - name: Run mobile equipment tests
        run: files=$(find src/ui/mobile -name '*Equipment*.test.js' -print); [ -z "$files" ] || node --test $files

      - name: Run mobile spell tests
        run: files=$(find src/ui/mobile -name '*Spell*.test.js' -print); [ -z "$files" ] || node --test $files

      - name: Run mobile power tests
        run: files=$(find src/ui/mobile -name '*Power*.test.js' -print); [ -z "$files" ] || node --test $files

      - name: Run mobile trait tests
        run: files=$(find src/ui/mobile -name '*Trait*.test.js' -print); [ -z "$files" ] || node --test $files

      - name: Run mobile skill tests
        run: files=$(find src/ui/mobile -name '*Skill*.test.js' -print); [ -z "$files" ] || node --test $files

      - name: Run mobile secondary tests
        run: files=$(find src/ui/mobile -name '*Secondary*.test.js' -print); [ -z "$files" ] || node --test $files

      - name: Run mobile remaining tests
        run: node --test $(find src/ui/mobile -name '*.test.js' ! -name '*Attack*.test.js' ! -name '*Equipment*.test.js' ! -name '*Spell*.test.js' ! -name '*Power*.test.js' ! -name '*Trait*.test.js' ! -name '*Skill*.test.js' ! -name '*Secondary*.test.js' -print)
