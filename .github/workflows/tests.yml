name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('tests-pr-{0}', github.event.pull_request.number) || format('tests-run-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Run exact equipment edit app test
        run: node --test src/ui/mobile/CharacterMobileEquipmentEditApp.test.js

      - name: Run other equipment edit tests
        run: files=$(find src/ui/mobile -name '*Equipment*Edit*.test.js' ! -name 'CharacterMobileEquipmentEditApp.test.js' -print); [ -z "$files" ] || node --test $files
