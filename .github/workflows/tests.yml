name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('tests-pr-{0}', github.event.pull_request.number) || format('tests-run-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Apply base-cost invalidation fix
        run: |
          python - <<'PY'
          from pathlib import Path

          traits_path = Path("src/domain/character/Traits.js")
          text = traits_path.read_text()

          old = '''  if (!hasOwn(incomingClone, "pointValue")) {
              const pointValue = cloneValue(existing.pointValue);
              const sourceKind = isPlainObject(merged.source)
                ? merged.source.kind
                : existing.source.kind;

              if (hasOwn(incomingClone, "points")) {
                const incomingPoints = normalizeLegacyNullableNumber(incomingClone.points);
                if (!Object.is(incomingPoints, existing.points)) {
                  pointValue.legacyPoints = incomingPoints;

                  if (
                    pointValue.declaredPoints !== null ||
                    sourceKind === "singular" ||
                    EXTERNAL_SOURCE_KINDS.has(sourceKind)
                  ) {
                    pointValue.declaredPoints = incomingPoints;
                  }
                }
              }

              if (hasOwn(incomingClone, "levels")) {
                const incomingLevels = normalizeLegacyNullableNumber(incomingClone.levels);
                if (!Object.is(incomingLevels, existing.levels)) {
                  pointValue.levels = incomingLevels;
                }
              }

              merged.pointValue = pointValue;
            }'''

          new = '''  if (!hasOwn(incomingClone, "pointValue")) {
              const pointValue = cloneValue(existing.pointValue);
              const previousCalculation = pointValue.baseCostCalculation;
              let calculationInputsChanged = false;
              const sourceKind = isPlainObject(merged.source)
                ? merged.source.kind
                : existing.source.kind;

              if (hasOwn(incomingClone, "points")) {
                const incomingPoints = normalizeLegacyNullableNumber(incomingClone.points);
                if (!Object.is(incomingPoints, existing.points)) {
                  pointValue.legacyPoints = incomingPoints;
                  calculationInputsChanged = true;

                  if (
                    pointValue.declaredPoints !== null ||
                    sourceKind === "singular" ||
                    EXTERNAL_SOURCE_KINDS.has(sourceKind)
                  ) {
                    pointValue.declaredPoints = incomingPoints;
                  }
                }
              }

              if (hasOwn(incomingClone, "levels")) {
                const incomingLevels = normalizeLegacyNullableNumber(incomingClone.levels);
                if (!Object.is(incomingLevels, existing.levels)) {
                  pointValue.levels = incomingLevels;
                  calculationInputsChanged = true;
                }
              }

              if (calculationInputsChanged && previousCalculation !== null) {
                if (Object.is(
                  pointValue.calculatedPoints,
                  previousCalculation.calculatedPoints,
                )) {
                  pointValue.calculatedPoints = null;
                }
                pointValue.baseCostCalculation = null;
              }

              merged.pointValue = pointValue;
            }'''

          if old not in text:
            if "calculationInputsChanged && previousCalculation" not in text:
              raise SystemExit("legacy merge block not found")
          else:
            text = text.replace(old, new, 1)
            traits_path.write_text(text)

          test_path = Path("src/domain/character/TraitBaseCostOperations.test.js")
          tests = test_path.read_text()
          marker = 'test("legacy level edit invalidates only the derived calculation"'
          if marker not in tests:
            tests += '''

            test("legacy level edit invalidates only the derived calculation", () => {
              const imported = createCharacter({
                traits: [{
                  id: "trait-imported-level-edit",
                  role: "advantage",
                  name: "Importada por nível",
                  points: 15,
                  source: {
                    kind: "imported",
                    provider: "gcs",
                    format: "gcs",
                    reference: null,
                    version: 2,
                  },
                  pointValue: {
                    mode: "per-level",
                    pointsPerLevel: 5,
                    levels: 3,
                    importedPoints: 15,
                  },
                }],
              });
              const costed = recalculateTraitBaseCost(
                imported,
                "trait-imported-level-edit",
                { now: "2026-06-21T22:00:00.000Z" },
              );
              const edited = createCharacter({
                ...costed.character,
                advantages: costed.character.advantages.map(item => ({
                  ...item,
                  levels: 4,
                })),
              });
              const pointValue = edited.traits[0].pointValue;

              assert.equal(pointValue.levels, 4);
              assert.equal(pointValue.importedPoints, 15);
              assert.equal(pointValue.calculatedPoints, null);
              assert.equal(pointValue.baseCostCalculation, null);
              assert.equal(pointValue.reconciliation.status, "imported-only");
            });
            '''
            test_path.write_text(tests)

          docs_path = Path("Docs/01-arquitetura/Traits.md")
          docs = docs_path.read_text()
          docs = docs.replace(
            "**Código:** DOM-TRAIT-1.0 a 1.1",
            "**Código:** DOM-TRAIT-1.0 a 1.2",
          )
          docs = docs.replace(
            "**Tipo:** Agregado canônico, identidade, papéis e autoridades de valor",
            "**Tipo:** Agregado canônico, autoridades de valor e cálculo-base",
          )
          docs = docs.replace(
            "**Decisões:** ADR-0035 e ADR-0036",
            "**Decisões:** ADR-0035 a ADR-0037",
          )
          docs = docs.replace(
            "DOM-TRAIT-1.0 e 1.1 não calculam custo final, não aplicam modificadores e não escolhem silenciosamente qual valor é efetivo.",
            "DOM-TRAIT-1.0 a 1.2 calculam apenas o custo-base autorizado; não aplicam modificadores nem escolhem silenciosamente um valor efetivo.",
          )
          section = '''

          ## DOM-TRAIT-1.2 — Cálculo soberano do custo-base

          O custo-base é calculado por uma autoridade pura e explicável nos modos `total`, `per-level` e `base-plus-levels`.

          O resultado preserva valor bruto, política de arredondamento, fingerprint das entradas e diagnósticos. `importedPoints` nunca é promovido automaticamente a fórmula.

          Um snapshot persistido em `pointValue.baseCostCalculation` deve estar calculado e continuar compatível com as entradas atuais. Edições estruturais invalidam somente esse resultado derivado, preservando as demais autoridades.

          Documento: `TraitBaseCost.md`.  
          Decisão: ADR-0037.
          '''
          if "## DOM-TRAIT-1.2 — Cálculo soberano do custo-base" not in docs:
            docs = docs.replace("\n## Compatibilidade", section + "\n## Compatibilidade", 1)
          docs = docs.replace(
            "DOM-TRAIT-1.1 fornece as trilhas separadas que essas regras consumirão.",
            "DOM-TRAIT-1.2 fornece um custo-base calculado; modificadores e demais regras continuam em blocos posteriores.",
          )
          docs = docs.replace(
            "DOM-TRAIT-1.0 e 1.1 não:",
            "DOM-TRAIT-1.0 a 1.2 não:",
          )
          docs = docs.replace(
            "## Critério de conclusão do DOM-TRAIT-1.1",
            "## Critério de conclusão do DOM-TRAIT-1.2",
          )
          docs_path.write_text(docs)
          PY

          git rm -f Docs/01-arquitetura/Traits-1.2-Status.md

      - name: Commit correction
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/domain/character/Traits.js src/domain/character/TraitBaseCostOperations.test.js Docs/01-arquitetura/Traits.md Docs/01-arquitetura/Traits-1.2-Status.md
          git commit -m "fix: invalidar cálculo-base após edição estrutural"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Run full test suite
        run: npm test
