name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        id: tests
        shell: bash
        run: |
          set +e
          npm test > test-output.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload test diagnostics
        if: steps.tests.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test-output.log
          if-no-files-found: error

      - name: Preserve test result
        if: steps.tests.outputs.status != '0'
        run: exit 1
