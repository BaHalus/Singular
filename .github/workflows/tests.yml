name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('tests-pr-{0}', github.event.pull_request.number) || format('tests-run-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout quiet
        run: |
          git init -q .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git fetch -q --depth=1 origin "$GITHUB_SHA"
          git checkout -q --detach FETCH_HEAD

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Run full test suite
        run: |
          set -o pipefail
          npm test 2>&1 | tee singular-test.log

      - name: Capture test tail
        if: always()
        run: |
          if [ -f singular-test.log ]; then
            tail -n 200 singular-test.log > singular-test-tail.txt
            cat singular-test-tail.txt
          else
            echo "singular-test.log was not created" | tee singular-test-tail.txt
          fi

      - name: Upload test tail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: singular-test-tail
          path: singular-test-tail.txt
          if-no-files-found: error
