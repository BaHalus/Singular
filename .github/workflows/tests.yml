name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        shell: bash
        run: |
          set +e
          npm test > test-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::group::Test failure summary"
            grep -n -E "^(not ok|# fail|# error|# tests|# pass|# skipped|# cancelled|# duration)|AssertionError|Error \[|ERR_|failureType|testCodeFailure|expected:|actual:" test-output.log | tail -n 240 || true
            echo "::endgroup::"
          fi
          exit "$status"
