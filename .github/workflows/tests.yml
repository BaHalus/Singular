name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('tests-pr-{0}', github.event.pull_request.number) || format('tests-run-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Diagnose Point Ledger tests
        id: point-ledger-diagnostics
        run: |
          set +e
          node --test src/domain/points/*.test.js src/domain/import/PointBudgetImporter.test.js > point-ledger-test.log 2>&1
          status=$?
          cat point-ledger-test.log
          exit "$status"

      - name: Upload Point Ledger diagnostics
        if: ${{ failure() && steps.point-ledger-diagnostics.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: point-ledger-test-log
          path: point-ledger-test.log
          if-no-files-found: error
          retention-days: 1

      - name: Run full test suite
        run: npm test
