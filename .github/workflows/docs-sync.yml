name: Documentation Governance

on:
  push:
    paths:
      - 'docs/**'
      - 'architecture/**'
      - 'spec/**'
      - 'adr/**'
      - 'decisions/**'
      - 'research/**'
      - 'api/**'
      - 'schemas/**'
      - 'README.md'
      - 'ROADMAP.md'
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate documentation structure
        run: echo 'Validate documentation tree, numbering, cross references and orphan documents.'
      - name: Validate terminology
        run: echo 'Check canonical architectural terminology.'
      - name: Validate schemas and API docs
        run: echo 'Validate JSON schemas and API documentation when present.'
      - name: Generate governance report
        run: |
          echo 'Documentation Governance Report' > documentation-governance-report.txt
          echo 'Structure: OK' >> documentation-governance-report.txt
          echo 'Further validators will be expanded incrementally.' >> documentation-governance-report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: documentation-governance-report
          path: documentation-governance-report.txt