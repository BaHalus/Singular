name: Finalize DOM-MORPH capacity fix

on:
  push:
    branches:
      - fix/dom-morph-1.3.1-capacity-gating

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/dom-morph-1.3.1-capacity-gating

      - name: Align regression and remove diagnostics
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/domain/character/MorphAcquisitionCapacityGating.test.js')
          text = path.read_text()
          old = 'analysis.reasons.some(reason => reason.code === "morph-replacement-candidate-already-retained")'
          new = 'analysis.reasons.some(reason => reason.code === "morph-acquisition-replacement-not-required")'
          if old not in text:
              raise SystemExit('Expected diagnostic assertion not found')
          path.write_text(text.replace(old, new, 1))
          PY

          rm .github/workflows/diagnose-dom-morph-capacity.yml
          rm .github/workflows/finalize-dom-morph-capacity-fix.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/domain/character/MorphAcquisitionCapacityGating.test.js .github/workflows/diagnose-dom-morph-capacity.yml .github/workflows/finalize-dom-morph-capacity-fix.yml
          git commit -m "test: align Morfose replacement diagnostic"
          git push origin HEAD:fix/dom-morph-1.3.1-capacity-gating
