name: Apply DOM-MORPH capacity fix

on:
  push:
    branches:
      - fix/dom-morph-1.3.1-capacity-gating

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/dom-morph-1.3.1-capacity-gating

      - name: Patch capacity gating
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/domain/character/MorphCatalogOperations.js')
          text = path.read_text()

          def replace_once(old, new):
              global text
              if old not in text:
                  raise SystemExit(f'Expected fragment not found:\n{old}')
              text = text.replace(old, new, 1)

          replace_once(
          '''    case "acquire-form":
                validateCandidate(character, normalizedInput.knownForm, identityResolution, block);
                break;
          ''',
          '''    case "acquire-form":
                validateCandidate(character, normalizedInput.knownForm, identityResolution, block);
                analyzeAcquisition({
                  set,
                  normalizedInput,
                  identityResolution,
                  policy,
                  capacityEvaluation,
                  block,
                  pending,
                });
                break;
          ''')

          replace_once(
          '''      knownFormId: options.knownFormId ?? input.knownFormId ?? null,
                knownForm: input,
          ''',
          '''      knownFormId: options.knownFormId ?? input.knownFormId ?? null,
                replacementKnownFormId: options.replacementKnownFormId ??
                  input.replacementKnownFormId ?? null,
                knownForm: input,
          ''')

          marker = '''function analyzeReplacement(
          '''
          helper = '''function analyzeAcquisition({
            set,
            normalizedInput,
            identityResolution,
            policy,
            capacityEvaluation,
            block,
            pending,
          }) {
            if (normalizedInput.replacementKnownFormId !== null) {
              analyzeReplacement(
                set,
                normalizedInput,
                identityResolution,
                capacityEvaluation,
                block,
              );
            }

            if (policy.mode !== "limited" || capacityEvaluation.requiredSlots === 0) {
              return;
            }
            if (capacityEvaluation.capacity === null) {
              pending("morph-acquisition-capacity-unknown");
              return;
            }
            if (capacityEvaluation.wouldExceed) {
              if (normalizedInput.replacementKnownFormId === null) {
                pending("morph-acquisition-replacement-required", {
                  capacity: capacityEvaluation.capacity,
                  projectedUsed: capacityEvaluation.projectedUsed,
                });
              } else {
                block("morph-acquisition-capacity-exceeded", {
                  capacity: capacityEvaluation.capacity,
                  projectedUsed: capacityEvaluation.projectedUsed,
                });
              }
            }
          }

          function analyzeReplacement(
          '''
          replace_once(marker, helper)

          replace_once(
          '''  if (input.type === "replace-memorized-form") {
              knownForms = knownForms.map(form => (
          ''',
          '''  if (input.replacementKnownFormId !== null) {
              knownForms = knownForms.map(form => (
          ''')

          replace_once(
          '''  const eventType = input.type === "memorize-form" ? "form-memorized" :
              input.type === "observe-form" ? "form-observed" :
                input.type === "replace-memorized-form" ? "form-replaced" :
                  "form-acquired";
          ''',
          '''  const eventType = input.replacementKnownFormId !== null
              ? "form-replaced"
              : input.type === "memorize-form" ? "form-memorized" :
                input.type === "observe-form" ? "form-observed" :
                  "form-acquired";
          ''')

          replace_once(
          '''    relatedKnownFormId: input.type === "replace-memorized-form"
                ? input.replacementKnownFormId
                : null,
          ''',
          '''    relatedKnownFormId: input.replacementKnownFormId,
          ''')

          replace_once(
          '''    previousState: input.type === "replace-memorized-form"
                ? findMorphKnownForm(set, input.replacementKnownFormId)?.state ?? null
                : previousState,
              nextState: input.type === "replace-memorized-form"
                ? "forgotten"
                : stored?.state ?? null,
          ''',
          '''    previousState: input.replacementKnownFormId !== null
                ? findMorphKnownForm(set, input.replacementKnownFormId)?.state ?? null
                : previousState,
              nextState: input.replacementKnownFormId !== null
                ? "forgotten"
                : stored?.state ?? null,
          ''')

          replace_once(
          '''  const replacement = input.type === "replace-memorized-form"
              ? findMorphKnownForm(set, input.replacementKnownFormId)
              : null;
          ''',
          '''  const replacement = input.replacementKnownFormId !== null
              ? findMorphKnownForm(set, input.replacementKnownFormId)
              : null;
          ''')

          replace_once(
          '''function isRetentionOperation(type) {
            return ["observe-form", "memorize-form", "replace-memorized-form"].includes(type);
          }
          ''',
          '''function isRetentionOperation(type) {
            return [
              "acquire-form",
              "observe-form",
              "memorize-form",
              "replace-memorized-form",
            ].includes(type);
          }
          ''')

          path.write_text(text)

          docs = Path('Docs/01-arquitetura/MorfoseKnownFormIdentity.md')
          doc = docs.read_text()
          old = '''Reaquisição de uma entrada já retida exige `0` espaços adicionais. Reaquisição de uma entrada `forgotten` exige `1` espaço e pode exigir substituição explícita quando a capacidade estiver cheia.
          '''
          new = '''Reaquisição de uma entrada já retida exige `0` espaços adicionais. Reaquisição de uma entrada `forgotten` exige `1` espaço e pode exigir substituição explícita quando a capacidade estiver cheia.

          `acquire-form` obedece à capacidade limitada conhecida. Quando uma aquisição manual ou importada acrescenta ocupação e excederia o repertório, o plano permanece pendente até receber `replacementKnownFormId`. A substituição ocorre atomicamente e é registrada como `form-replaced`.
          '''
          if old not in doc:
              raise SystemExit('Architecture capacity paragraph not found')
          docs.write_text(doc.replace(old, new, 1))

          adr = Path('Docs/02-decisoes/ADR-0024-MorfoseKnownFormIdentity.md')
          decision = adr.read_text()
          old = '''Uma entrada já retida tem delta de ocupação `0`. Uma entrada nova ou esquecida tem delta `1`.
          '''
          new = '''Uma entrada já retida tem delta de ocupação `0`. Uma entrada nova ou esquecida tem delta `1`.

          Aquisições manuais e importadas não podem ultrapassar silenciosamente uma capacidade limitada conhecida. Quando o delta excede o repertório, a análise exige `replacementKnownFormId`; a forma escolhida é esquecida e a aquisição é persistida na mesma operação atômica.
          '''
          if old not in decision:
              raise SystemExit('ADR capacity paragraph not found')
          adr.write_text(decision.replace(old, new, 1))
          PY

          rm .github/workflows/apply-dom-morph-capacity-fix.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/domain/character/MorphCatalogOperations.js Docs/01-arquitetura/MorfoseKnownFormIdentity.md Docs/02-decisoes/ADR-0024-MorfoseKnownFormIdentity.md .github/workflows/apply-dom-morph-capacity-fix.yml
          git commit -m "fix: gate Morfose acquisitions by memorization capacity"
          git push origin HEAD:fix/dom-morph-1.3.1-capacity-gating
