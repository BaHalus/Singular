name: Remove stray branches

on:
  pull_request:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete stray verification and maintenance refs
        uses: actions/github-script@v7
        with:
          script: |
            const refs = [
              'heads/verify/list-all-branches',
              'heads/maintenance/remove-stray-branch',
            ];

            for (const ref of refs) {
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref,
                });
                core.info(`Deleted ${ref}`);
              } catch (error) {
                if (error.status === 404) {
                  core.info(`Already absent: ${ref}`);
                  continue;
                }
                throw error;
              }
            }
