name: Trait 1.4 Debug

on:
  push:
    branches:
      - feature/dom-trait-1.4
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run combined Trait tests
        id: combined
        continue-on-error: true
        shell: bash
        run: |
          node --test \
            src/domain/character/TraitControl.test.js \
            src/domain/character/TraitChoices.test.js \
            src/domain/character/TraitFinalCost.test.js \
            src/domain/character/TraitControl.integration.test.js \
            src/domain/character/TraitFinalCost.gate.test.js \
            src/domain/character/TraitChoices.gate.test.js \
            src/domain/import/importers/TraitsImporter.control.test.js \
            > combined.log 2>&1

      - name: Extract combined diagnostic
        id: diagnostic
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re

          with open("combined.log", encoding="utf-8") as handle:
              lines = handle.read().splitlines()

          selected = []
          for index, line in enumerate(lines):
              if "not ok" in line.lower():
                  selected.extend(lines[max(0, index - 1):min(len(lines), index + 15)])
                  break
          if not selected:
              selected = lines[-15:]

          text = " | ".join(re.sub(r"\s+", " ", line.strip()) for line in selected if line.strip())
          text = text.replace("%", " percent ").replace("\r", " ").replace("\n", " ")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"message1={text[:700]}\n")
              output.write(f"message2={text[700:1400]}\n")
          PY

      - name: "DIAGNOSTIC 1 — ${{ steps.diagnostic.outputs.message1 }}"
        if: always()
        run: true

      - name: "DIAGNOSTIC 2 — ${{ steps.diagnostic.outputs.message2 }}"
        if: always()
        run: true

      - name: Propagate combined result
        if: steps.combined.outcome == 'failure'
        run: exit 1
