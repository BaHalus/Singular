name: Trait 1.4 Debug

on:
  push:
    branches:
      - feature/dom-trait-1.4
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: TraitControl unit
        id: control
        continue-on-error: true
        run: node --test src/domain/character/TraitControl.test.js

      - name: TraitChoices unit
        id: choices
        continue-on-error: true
        run: node --test src/domain/character/TraitChoices.test.js

      - name: TraitFinalCost unit
        id: final_cost
        continue-on-error: true
        run: node --test src/domain/character/TraitFinalCost.test.js

      - name: Trait aggregate integration
        id: integration
        continue-on-error: true
        run: node --test src/domain/character/TraitControl.integration.test.js

      - name: Trait choices gate
        id: choices_gate
        continue-on-error: true
        run: node --test src/domain/character/TraitChoices.gate.test.js

      - name: Trait final cost gate
        id: final_gate
        continue-on-error: true
        run: node --test src/domain/character/TraitFinalCost.gate.test.js

      - name: Traits importer control
        id: importer
        continue-on-error: true
        run: node --test src/domain/import/importers/TraitsImporter.control.test.js

      - name: Propagate test result
        if: always()
        run: |
          test "${{ steps.control.outcome }}" = success
          test "${{ steps.choices.outcome }}" = success
          test "${{ steps.final_cost.outcome }}" = success
          test "${{ steps.integration.outcome }}" = success
          test "${{ steps.choices_gate.outcome }}" = success
          test "${{ steps.final_gate.outcome }}" = success
          test "${{ steps.importer.outcome }}" = success
