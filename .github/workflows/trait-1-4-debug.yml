name: Trait 1.4 Debug

on:
  push:
    branches:
      - feature/dom-trait-1.4
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run full test suite
        id: tests
        continue-on-error: true
        run: npm test > trait-1-4-test-output.log 2>&1

      - name: Extract compact diagnostics
        id: diagnostics
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re

          with open("trait-1-4-test-output.log", encoding="utf-8") as handle:
              lines = handle.read().splitlines()

          markers = (
              "not ok", "AssertionError", "SyntaxError", "ReferenceError",
              "TypeError", "ERR_", "error:", "failureType:", "expected:",
              "actual:", "operator:", "testCodeFailure",
          )
          interesting = []
          for line in lines:
              text = line.strip()
              if any(marker.lower() in text.lower() for marker in markers):
                  text = re.sub(r"\s+", " ", text)
                  if text and text not in interesting:
                      interesting.append(text)

          selected = interesting[-9:]
          chunks = [" | ".join(selected[index:index + 3]) for index in range(0, 9, 3)]
          while len(chunks) < 3:
              chunks.append("no-additional-diagnostic")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for index, chunk in enumerate(chunks[:3], 1):
                  safe = chunk.replace("%", " percent ").replace("\r", " ").replace("\n", " ")
                  output.write(f"message{index}={safe[:700]}\n")
          PY

      - name: "DIAGNOSTIC 1 — ${{ steps.diagnostics.outputs.message1 }}"
        if: always()
        run: true

      - name: "DIAGNOSTIC 2 — ${{ steps.diagnostics.outputs.message2 }}"
        if: always()
        run: true

      - name: "DIAGNOSTIC 3 — ${{ steps.diagnostics.outputs.message3 }}"
        if: always()
        run: true

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trait-1-4-test-output
          path: trait-1-4-test-output.log
          retention-days: 1

      - name: Propagate test result
        if: steps.tests.outcome == 'failure'
        run: exit 1
