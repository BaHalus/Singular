name: Trait 1.4 Debug

on:
  push:
    branches:
      - feature/dom-trait-1.4
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run full test suite
        id: tests
        continue-on-error: true
        run: npm test > trait-1-4-test-output.log 2>&1

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trait-1-4-test-output
          path: trait-1-4-test-output.log
          retention-days: 1

      - name: Propagate test result
        if: steps.tests.outcome == 'failure'
        run: exit 1
