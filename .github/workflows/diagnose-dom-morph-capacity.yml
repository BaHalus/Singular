name: Diagnose DOM-MORPH capacity

on:
  push:
    branches:
      - fix/dom-morph-1.3.1-capacity-gating
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run tests and isolate failures
        id: tests
        shell: bash
        run: |
          set +e
          node --test > test-output.txt 2>&1
          code=$?
          python - <<'PY' > failure-summary.txt
          from pathlib import Path
          lines = Path('test-output.txt').read_text(errors='replace').splitlines()
          indexes = [i for i, line in enumerate(lines) if line.startswith('not ok ')]
          if not indexes:
              print('\n'.join(lines[-120:]))
          else:
              for index in indexes:
                  print('\n'.join(lines[max(0, index - 3):min(len(lines), index + 50)]))
                  print('--- FAILURE SEPARATOR ---')
              summary = next((i for i in range(len(lines) - 1, -1, -1) if lines[i].startswith('1..')), None)
              if summary is not None:
                  print('\n'.join(lines[summary:]))
          PY
          cat failure-summary.txt
          exit $code
      - name: Upload failure summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dom-morph-capacity-failure-summary
          path: failure-summary.txt
          if-no-files-found: error
