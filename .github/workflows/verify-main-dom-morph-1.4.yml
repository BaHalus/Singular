name: Verify main DOM-MORPH-1.4

on:
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  verify-main-push:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Tests push run for main commit
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const baseSha = context.payload.pull_request.base.sha;
            const response = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: baseSha,
              event: 'push',
              per_page: 20,
            });
            const runs = response.data.workflow_runs
              .filter(run => run.name === 'Tests')
              .sort((left, right) => new Date(right.created_at) - new Date(left.created_at));
            const run = runs[0] ?? null;
            const result = {
              verifiedCommit: baseSha,
              found: run !== null,
              run: run === null ? null : {
                id: run.id,
                runNumber: run.run_number,
                event: run.event,
                status: run.status,
                conclusion: run.conclusion,
                headBranch: run.head_branch,
                headSha: run.head_sha,
                createdAt: run.created_at,
                updatedAt: run.updated_at,
                htmlUrl: run.html_url,
              },
            };
            fs.writeFileSync('main-push-run.json', JSON.stringify(result, null, 2));
            core.info(JSON.stringify(result));
            if (!run) {
              core.setFailed(`No push-triggered Tests run found for ${baseSha}`);
            } else if (run.status !== 'completed' || run.conclusion !== 'success') {
              core.setFailed(`Main push run is ${run.status}/${run.conclusion}`);
            }
      - name: Upload verification result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-push-run
          path: main-push-run.json
          if-no-files-found: error
