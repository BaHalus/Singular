name: Refine DOM-MORPH capacity fix

on:
  push:
    branches:
      - fix/dom-morph-1.3.1-capacity-gating

permissions:
  contents: write

jobs:
  refine-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/dom-morph-1.3.1-capacity-gating

      - name: Reject unnecessary replacements
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/domain/character/MorphCatalogOperations.js')
          text = path.read_text()
          old = '''function analyzeAcquisition({
            set,
            normalizedInput,
            identityResolution,
            policy,
            capacityEvaluation,
            block,
            pending,
          }) {
            if (normalizedInput.replacementKnownFormId !== null) {
              analyzeReplacement(
                set,
                normalizedInput,
                identityResolution,
                capacityEvaluation,
                block,
              );
            }

            if (policy.mode !== "limited" || capacityEvaluation.requiredSlots === 0) {
              return;
            }
            if (capacityEvaluation.capacity === null) {
              pending("morph-acquisition-capacity-unknown");
              return;
            }
            if (capacityEvaluation.wouldExceed) {
              if (normalizedInput.replacementKnownFormId === null) {
                pending("morph-acquisition-replacement-required", {
                  capacity: capacityEvaluation.capacity,
                  projectedUsed: capacityEvaluation.projectedUsed,
                });
              } else {
                block("morph-acquisition-capacity-exceeded", {
                  capacity: capacityEvaluation.capacity,
                  projectedUsed: capacityEvaluation.projectedUsed,
                });
              }
            }
          }
          '''
          new = '''function analyzeAcquisition({
            set,
            normalizedInput,
            identityResolution,
            policy,
            capacityEvaluation,
            block,
            pending,
          }) {
            const replacementProvided = normalizedInput.replacementKnownFormId !== null;

            if (policy.mode !== "limited" || capacityEvaluation.requiredSlots === 0) {
              if (replacementProvided) {
                block("morph-acquisition-replacement-not-required");
              }
              return;
            }
            if (capacityEvaluation.capacity === null) {
              pending("morph-acquisition-capacity-unknown");
              return;
            }

            const projectedWithoutReplacement = capacityEvaluation.used +
              capacityEvaluation.requiredSlots;
            const replacementRequired = projectedWithoutReplacement >
              capacityEvaluation.capacity;

            if (!replacementRequired) {
              if (replacementProvided) {
                block("morph-acquisition-replacement-not-required", {
                  capacity: capacityEvaluation.capacity,
                  projectedWithoutReplacement,
                });
              }
              return;
            }

            if (!replacementProvided) {
              pending("morph-acquisition-replacement-required", {
                capacity: capacityEvaluation.capacity,
                projectedWithoutReplacement,
              });
              return;
            }

            analyzeReplacement(
              set,
              normalizedInput,
              identityResolution,
              capacityEvaluation,
              block,
            );
            if (capacityEvaluation.wouldExceed) {
              block("morph-acquisition-capacity-exceeded", {
                capacity: capacityEvaluation.capacity,
                projectedUsed: capacityEvaluation.projectedUsed,
              });
            }
          }
          '''
          if old not in text:
              raise SystemExit('Acquisition helper fragment not found')
          path.write_text(text.replace(old, new, 1))

          docs = Path('Docs/01-arquitetura/MorfoseKnownFormIdentity.md')
          doc = docs.read_text()
          old_doc = '''`acquire-form` obedece à capacidade limitada conhecida. Quando uma aquisição manual ou importada acrescenta ocupação e excederia o repertório, o plano permanece pendente até receber `replacementKnownFormId`. A substituição ocorre atomicamente e é registrada como `form-replaced`.
          '''
          new_doc = '''`acquire-form` obedece à capacidade limitada conhecida. Quando uma aquisição manual ou importada acrescenta ocupação e excederia o repertório, o plano permanece pendente até receber `replacementKnownFormId`. A substituição ocorre atomicamente e é registrada como `form-replaced`. Uma substituição também é recusada quando há espaço livre ou quando a aquisição reutiliza uma entrada já retida.
          '''
          if old_doc not in doc:
              raise SystemExit('Architecture replacement paragraph not found')
          docs.write_text(doc.replace(old_doc, new_doc, 1))
          PY

          rm .github/workflows/refine-dom-morph-capacity-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/domain/character/MorphCatalogOperations.js Docs/01-arquitetura/MorfoseKnownFormIdentity.md .github/workflows/refine-dom-morph-capacity-fix.yml
          git commit -m "fix: reject unnecessary Morfose acquisition replacements"
          git push origin HEAD:fix/dom-morph-1.3.1-capacity-gating
