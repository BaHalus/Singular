name: App Core Projection Debug

on:
  push:
    branches:
      - feature/app-core-1.0
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run focused test
        id: tests
        continue-on-error: true
        run: node --test src/application/projections/ApplicationReadModel.test.js > projection-output.log 2>&1
      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-core-projection-output
          path: projection-output.log
          retention-days: 1
      - name: Propagate result
        if: steps.tests.outcome == 'failure'
        run: exit 1
