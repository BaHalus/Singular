name: Publish mobile test site

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build public artifact
        run: npm run build:public

      - name: Smoke public artifact
        run: npm run test:public-deployment

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build-and-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-public-deployment:
    if: github.event_name != 'pull_request'
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify HTTPS page and manifest
        env:
          PUBLIC_URL: https://bahalus.github.io/Singular/mobile.html
          MANIFEST_URL: https://bahalus.github.io/Singular/manifest.webmanifest
        run: |
          curl --fail --silent --show-error --location --retry 12 --retry-delay 5 --retry-all-errors "$PUBLIC_URL" --output mobile.html
          grep -F 'rel="manifest"' mobile.html
          curl --fail --silent --show-error --location --retry 12 --retry-delay 5 --retry-all-errors "$MANIFEST_URL" --output manifest.webmanifest
          node --input-type=module <<'NODE'
          import { readFile } from "node:fs/promises";
          const manifest = JSON.parse(await readFile("manifest.webmanifest", "utf8"));
          if (manifest.start_url !== "./mobile.html") throw new Error(`unexpected start_url: ${manifest.start_url}`);
          if (manifest.scope !== "./") throw new Error(`unexpected scope: ${manifest.scope}`);
          if (manifest.display !== "standalone") throw new Error(`unexpected display: ${manifest.display}`);
          NODE
