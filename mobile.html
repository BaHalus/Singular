<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#10151d">
    <meta name="application-name" content="SINGULAR">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SINGULAR">
    <title>SINGULAR Alpha</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icons/singular-192.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icons/singular-192.svg">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileApp.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileTouchTargets.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileTextOverflowGuards.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileSecondaryNotesApp.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileTraitEditApp.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileSkillTechniqueEditApp.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileLanguageCultureEditApp.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileAttackEditApp.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileEquipmentEditApp.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileSpellEditApp.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobilePowerEditApp.css">
  </head>
  <body>
    <main data-singular-mobile-root aria-live="polite">
      <noscript>A SINGULAR precisa de JavaScript habilitado.</noscript>
    </main>

    <script type="module">
      import { bootstrapCharacterMobileCompositionRoot } from "./src/ui/mobile/CharacterMobileCompositionRoot.js";

      const bootstrapCharacterMobileApp = bootstrapCharacterMobileCompositionRoot;

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            const registration = await navigator.serviceWorker.register("./sw.js", { scope: "./" });
            await navigator.serviceWorker.ready;

            const resources = performance.getEntriesByType("resource")
              .map(entry => entry.name)
              .filter(resourceUrl => new URL(resourceUrl).origin === location.origin);

            registration.active?.postMessage({ type: "CACHE_LOADED_RESOURCES", resources });
          } catch (error) {
            console.warn("Não foi possível registrar o modo offline da SINGULAR.", error);
          }
        });
      }

      try {
        await bootstrapCharacterMobileApp();
      } catch (error) {
        const root = document.querySelector("[data-singular-mobile-root]");
        if (root) {
          root.replaceChildren();
          const message = document.createElement("p");
          message.className = "singular-mobile-sheet__boot-error";
          message.textContent = "Não foi possível iniciar a SINGULAR Alpha.";
          root.append(message);
        }
        console.error(error);
      }
    </script>
  </body>
</html>
