<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#10151d">
    <title>SINGULAR Alpha</title>
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileApp.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileTraitEditApp.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileSkillTechniqueEditApp.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileLanguageCultureEditApp.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileAttackEditApp.css">
    <link rel="stylesheet" href="./src/ui/mobile/CharacterMobileEquipmentEditApp.css">
  </head>
  <body>
    <main data-singular-mobile-root aria-live="polite">
      <noscript>A SINGULAR precisa de JavaScript habilitado.</noscript>
    </main>

    <script type="module">
      import { bootstrapCharacterMobileApp } from "./src/ui/mobile/CharacterMobileApp.js";
      import { bootstrapCharacterMobileLanguageCultureApp } from "./src/ui/mobile/CharacterMobileLanguageCultureApp.js";
      import { bootstrapCharacterMobileSecondaryNotesApp } from "./src/ui/mobile/CharacterMobileSecondaryNotesApp.js";
      import { bootstrapCharacterMobileTraitEditApp } from "./src/ui/mobile/CharacterMobileTraitEditApp.js";
      import { bootstrapCharacterMobileSkillTechniqueEditApp } from "./src/ui/mobile/CharacterMobileSkillTechniqueEditApp.js";
      import { bootstrapCharacterMobileLanguageCultureEditApp } from "./src/ui/mobile/CharacterMobileLanguageCultureEditApp.js";
      import { bootstrapCharacterMobileAttackEditApp } from "./src/ui/mobile/CharacterMobileAttackEditApp.js";
      import { bootstrapCharacterMobileEquipmentEditApp } from "./src/ui/mobile/CharacterMobileEquipmentEditApp.js";
      import { bootstrapCharacterMobileSpellEditApp } from "./src/ui/mobile/CharacterMobileSpellEditApp.js";

      // Preserva a âncora de smoke test da página executável: await bootstrapCharacterMobileApp()
      // Preserva a âncora da integração anterior: await bootstrapCharacterMobileLanguageCultureApp()
      // Preserva a âncora da integração anterior: await bootstrapCharacterMobileSecondaryNotesApp()
      // Preserva a âncora da integração anterior: await bootstrapCharacterMobileTraitEditApp()
      // Preserva a âncora da integração anterior: await bootstrapCharacterMobileSkillTechniqueEditApp()
      // Preserva a âncora da integração anterior: await bootstrapCharacterMobileLanguageCultureEditApp()
      // Preserva a âncora da integração anterior: await bootstrapCharacterMobileAttackEditApp()
      // Preserva a âncora da integração anterior: await bootstrapCharacterMobileEquipmentEditApp()
      void bootstrapCharacterMobileApp;
      void bootstrapCharacterMobileLanguageCultureApp;
      void bootstrapCharacterMobileSecondaryNotesApp;
      void bootstrapCharacterMobileTraitEditApp;
      void bootstrapCharacterMobileSkillTechniqueEditApp;
      void bootstrapCharacterMobileLanguageCultureEditApp;
      void bootstrapCharacterMobileAttackEditApp;
      void bootstrapCharacterMobileEquipmentEditApp;

      try {
        await bootstrapCharacterMobileSpellEditApp();
      } catch (error) {
        const root = document.querySelector("[data-singular-mobile-root]");
        if (root) {
          root.replaceChildren();
          const message = document.createElement("p");
          message.className = "singular-mobile-sheet__boot-error";
          message.textContent = "Não foi possível iniciar a SINGULAR Alpha.";
          root.append(message);
        }
        console.error(error);
      }
    </script>
  </body>
</html>
